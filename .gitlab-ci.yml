stages:
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

build:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST << 'ENDSSH'
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
        docker pull $IMAGE_LATEST
        docker stop native-brand-tracker 2>/dev/null || true
        docker rm native-brand-tracker 2>/dev/null || true
        docker run -d \
          --name native-brand-tracker \
          --restart unless-stopped \
          -p 8501:8501 \
          -v /opt/native-brand-tracker/secrets.toml:/app/.streamlit/secrets.toml:ro \
          $IMAGE_LATEST
      ENDSSH
  only:
    - main
  when: manual
  environment:
    name: production
    url: http://$DEPLOY_HOST:8501
